<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KisaanMitra - Live Knowledge Graph</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: #fff;
            padding: 40px 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #10b981 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p {
            font-size: 1.2rem;
            opacity: 0.8;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #10b981;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #10b981;
            margin-bottom: 10px;
        }
        
        .stat-label {
            font-size: 1rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.5rem;
        }
        
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            color: #ef4444;
        }
        
        .data-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }
        
        .data-section h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #10b981;
        }
        
        .data-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        
        .data-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .data-item-name {
            font-weight: 600;
            color: #10b981;
            margin-bottom: 5px;
        }
        
        .data-item-value {
            opacity: 0.8;
            font-size: 0.9rem;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: block;
            margin: 30px auto;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
        }
        
        .last-updated {
            text-align: center;
            opacity: 0.6;
            margin-top: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌾 KisaanMitra Knowledge Graph</h1>
            <p>Live Agricultural Data Dashboard</p>
        </div>
        
        <div id="content">
            <div class="loading">⏳ Loading live data...</div>
        </div>
        
        <button class="refresh-btn" onclick="loadData()">🔄 Refresh Data</button>
    </div>
    
    <script>
        const DATA_URL = 'https://kisaanmitra-knowledge-graph.s3.ap-south-1.amazonaws.com/knowledge_graph_dummy_data.json';
        
        async function loadData() {
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = '<div class="loading">⏳ Loading live data...</div>';
            
            try {
                // Add cache-busting parameter
                const response = await fetch(DATA_URL + '?t=' + Date.now());
                
                if (!response.ok) {
                    throw new Error('Failed to load data');
                }
                
                const data = await response.json();
                displayData(data);
            } catch (error) {
                console.error('Error loading data:', error);
                contentDiv.innerHTML = `
                    <div class="error">
                        ❌ Error loading data: ${error.message}<br>
                        <small>Please try refreshing the page</small>
                    </div>
                `;
            }
        }
        
        function displayData(data) {
            const contentDiv = document.getElementById('content');
            const metadata = data.metadata || {};
            const farmers = data.farmers || [];
            
            // Get top districts
            const districtCounts = {};
            farmers.forEach(f => {
                const district = f.district || 'Unknown';
                districtCounts[district] = (districtCounts[district] || 0) + 1;
            });
            const topDistricts = Object.entries(districtCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);
            
            // Get top crops
            const cropCounts = {};
            farmers.forEach(f => {
                const crops = f.crops_grown || [];
                crops.forEach(crop => {
                    cropCounts[crop] = (cropCounts[crop] || 0) + 1;
                });
            });
            const topCrops = Object.entries(cropCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);
            
            contentDiv.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${metadata.total_farmers?.toLocaleString() || 0}</div>
                        <div class="stat-label">Total Farmers</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${metadata.total_districts || 0}</div>
                        <div class="stat-label">Districts</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${metadata.total_villages || 0}</div>
                        <div class="stat-label">Villages</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${metadata.total_crops || 0}</div>
                        <div class="stat-label">Crops</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${metadata.total_land?.toLocaleString() || 0}</div>
                        <div class="stat-label">Total Land (acres)</div>
                    </div>
                </div>
                
                <div class="data-section">
                    <h2>📍 Top 10 Districts by Farmers</h2>
                    <div class="data-list">
                        ${topDistricts.map(([name, count]) => `
                            <div class="data-item">
                                <div class="data-item-name">${name}</div>
                                <div class="data-item-value">${count.toLocaleString()} farmers</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="data-section">
                    <h2>🌱 Top 10 Crops by Farmers</h2>
                    <div class="data-list">
                        ${topCrops.map(([name, count]) => `
                            <div class="data-item">
                                <div class="data-item-name">${name}</div>
                                <div class="data-item-value">${count.toLocaleString()} farmers</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="last-updated">
                    Last Updated: ${metadata.last_updated ? new Date(metadata.last_updated).toLocaleString() : 'Unknown'}
                </div>
            `;
        }
        
        // Load data on page load
        window.addEventListener('load', loadData);
    </script>
</body>
</html>
